# Example 7: Retrieve all tag memberships using hostname as device identifier
- name: Generate tag memberships with hostname identifier
  hosts: dnac_servers
  vars_files:
    - credentials.yml
  gather_facts: false
  connection: local
  tasks:
    - name: Export all tag memberships identified by hostname
      cisco.dnac.tags_playbook_config_generator:
        dnac_host: "{{ dnac_host }}"
        dnac_port: "{{ dnac_port }}"
        dnac_username: "{{ dnac_username }}"
        dnac_password: "{{ dnac_password }}"
        dnac_verify: "{{ dnac_verify }}"
        dnac_debug: "{{ dnac_debug }}"
        dnac_version: "{{ dnac_version }}"
        dnac_log: true
        dnac_log_level: DEBUG
        dnac_log_append: false
        dnac_log_file_path: "{{ dnac_log_file_path }}"
        state: gathered
        config:
          - file_path: "/tmp/tags_by_hostname.yaml"
            component_specific_filters:
              components_list: ["tag_memberships"]
              tag_memberships:

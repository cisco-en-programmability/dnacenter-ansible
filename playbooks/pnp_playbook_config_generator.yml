---
- name: Generate PnP Brownfield Configuration
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - "credentials.yml"
  tasks:
    - name: Generate all PnP device configurations
      cisco.dnac.pnp_playbook_config_generator:
        dnac_host: "{{ dnac_host }}"
        dnac_username: "{{ dnac_username }}"
        dnac_password: "{{ dnac_password }}"
        dnac_verify: "{{ dnac_verify }}"
        dnac_port: "{{ dnac_port }}"
        dnac_version: "{{ dnac_version }}"
        dnac_debug: "{{ dnac_debug }}"
        dnac_log: true
        dnac_log_level: DEBUG
        state: gathered
        file_path: "tmp/pnp_device_info.yml"
        file_mode: append
        config:
          component_specific_filters:
            components_list: ["device_info"]
          global_filters:
            device_state: ["Unclaimed"]
